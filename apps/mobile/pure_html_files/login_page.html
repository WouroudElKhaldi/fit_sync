<!doctype html>

<html class="dark" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>FitSync Pro - Login</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-tertiary-fixed-variant": "#673d00",
              "on-secondary": "#30312e",
              "primary-fixed": "#e9ddff",
              "on-secondary-fixed": "#1b1c1a",
              "error-container": "#93000a",
              error: "#ffb4ab",
              tertiary: "#ffb869",
              "inverse-surface": "#d9e3f6",
              secondary: "#c8c6c3",
              "surface-tint": "#d0bcff",
              "on-error": "#690005",
              "on-tertiary-fixed": "#2c1700",
              "on-primary": "#3c0091",
              "surface-container-highest": "#2b3544",
              "primary-fixed-dim": "#d0bcff",
              "on-secondary-fixed-variant": "#474744",
              "on-surface": "#d9e3f6",
              "secondary-container": "#474744",
              "tertiary-fixed-dim": "#ffb869",
              background: "#091421",
              "surface-container-high": "#212b39",
              "on-primary-fixed-variant": "#5516be",
              outline: "#958ea0",
              "on-primary-container": "#340080",
              "on-primary-fixed": "#23005c",
              "tertiary-container": "#ca801e",
              "on-error-container": "#ffdad6",
              "on-background": "#d9e3f6",
              "surface-dim": "#091421",
              "inverse-primary": "#6d3bd7",
              "surface-container": "#16202e",
              "surface-variant": "#2b3544",
              "outline-variant": "#494454",
              surface: "#091421",
              "on-surface-variant": "#cbc3d7",
              "on-secondary-container": "#b6b5b1",
              "primary-container": "#a078ff",
              "inverse-on-surface": "#27313f",
              "on-tertiary": "#482900",
              "surface-bright": "#303a48",
              "secondary-fixed-dim": "#c8c6c3",
              primary: "#d0bcff",
              "on-tertiary-container": "#3f2300",
              "surface-container-low": "#121c2a",
              "surface-container-lowest": "#050f1c",
              "secondary-fixed": "#e4e2de",
              "tertiary-fixed": "#ffdcbb",
            },
            borderRadius: {
              DEFAULT: "0.25rem",
              lg: "0.5rem",
              xl: "0.75rem",
              full: "9999px",
            },
            spacing: {
              "touch-target-min": "48px",
              gutter: "16px",
              "stack-sm": "8px",
              "margin-mobile": "20px",
              "stack-lg": "24px",
              "stack-md": "16px",
            },
            fontFamily: {
              "label-caps": ["Plus Jakarta Sans"],
              "numeric-data": ["Plus Jakarta Sans"],
              "display-lg": ["Plus Jakarta Sans"],
              "body-lg": ["Plus Jakarta Sans"],
              "headline-md": ["Plus Jakarta Sans"],
              "body-base": ["Plus Jakarta Sans"],
              "display-xl": ["Plus Jakarta Sans"],
            },
            fontSize: {
              "label-caps": [
                "12px",
                {
                  lineHeight: "16px",
                  letterSpacing: "0.1em",
                  fontWeight: "700",
                },
              ],
              "numeric-data": [
                "20px",
                {
                  lineHeight: "24px",
                  letterSpacing: "-0.05em",
                  fontWeight: "600",
                },
              ],
              "display-lg": [
                "36px",
                {
                  lineHeight: "44px",
                  letterSpacing: "-0.03em",
                  fontWeight: "800",
                },
              ],
              "body-lg": [
                "18px",
                { lineHeight: "28px", letterSpacing: "0em", fontWeight: "400" },
              ],
              "headline-md": [
                "24px",
                {
                  lineHeight: "32px",
                  letterSpacing: "-0.02em",
                  fontWeight: "700",
                },
              ],
              "body-base": [
                "16px",
                { lineHeight: "24px", letterSpacing: "0em", fontWeight: "400" },
              ],
              "display-xl": [
                "48px",
                {
                  lineHeight: "56px",
                  letterSpacing: "-0.04em",
                  fontWeight: "800",
                },
              ],
            },
          },
        },
      };
    </script>
    <style>
      body {
        background-color: #1f2937; /* Enforcing deep charcoal background per request */
        color: #fdfbf7; /* Enforcing text color per request */
      }

      .glass-surface {
        background: rgba(255, 255, 255, 0.12);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.15);
      }

      .input-field {
        background: transparent;
        border: 1px solid rgba(255, 255, 255, 0.2);
        color: #fdfbf7;
        transition: all 0.3s ease;
      }

      .input-field:focus {
        border-color: theme("colors.primary");
        box-shadow: 0 0 15px rgba(208, 188, 255, 0.2);
        outline: none;
      }

      .btn-primary {
        background-color: theme("colors.primary");
        color: theme("colors.on-primary");
        box-shadow:
          inset 0 2px 0 rgba(255, 255, 255, 0.2),
          0 0 15px rgba(208, 188, 255, 0.2);
        transition: all 0.2s ease;
      }

      .btn-primary:active {
        transform: scale(0.98);
      }
    </style>
    <style>
      body {
        min-height: max(884px, 100dvh);
      }
    </style>
  </head>
  <body
    class="min-h-screen flex flex-col items-center justify-center p-margin-mobile relative overflow-hidden"
  >
    <!-- Ambient Background Glow -->
    <div class="absolute inset-0 z-0 pointer-events-none overflow-hidden">
      <div
        class="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] bg-primary rounded-full blur-[120px] opacity-10"
      ></div>
      <div
        class="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] bg-tertiary rounded-full blur-[120px] opacity-5"
      ></div>
    </div>
    <!-- Main Content Canvas -->
    <main class="w-full max-w-[400px] z-10 flex flex-col gap-stack-lg">
      <!-- Logo Header -->
      <header
        class="text-center mb-stack-lg flex flex-col items-center gap-stack-sm"
      >
        <span
          class="material-symbols-outlined text-primary text-[48px]"
          style="font-variation-settings: &quot;FILL&quot; 1"
          >fitness_center</span
        >
        <h1
          class="font-display-lg text-display-lg tracking-tighter text-primary"
        >
          FITSYNC PRO
        </h1>
        <p class="font-body-base text-body-base text-on-surface-variant">
          Elite Performance Tracking
        </p>
      </header>
      <!-- Login Form Container -->
      <form
        action="#"
        class="glass-surface rounded-xl p-6 flex flex-col gap-stack-md"
        method="POST"
      >
        <!-- Email Input -->
        <div class="flex flex-col gap-2">
          <label
            class="font-label-caps text-label-caps text-on-surface-variant uppercase"
            for="email"
            >Email Address</label
          >
          <div class="relative">
            <span
              class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant"
              >mail</span
            >
            <input
              class="input-field w-full h-touch-target-min rounded-lg pl-12 pr-4 font-body-base text-body-base placeholder-on-surface-variant/50"
              id="email"
              name="email"
              placeholder="athlete@fitsync.pro"
              required=""
              type="email"
            />
          </div>
        </div>
        <!-- Password Input -->
        <div class="flex flex-col gap-2">
          <div class="flex justify-between items-center">
            <label
              class="font-label-caps text-label-caps text-on-surface-variant uppercase"
              for="password"
              >Password</label
            >
            <a
              class="font-label-caps text-label-caps text-primary hover:opacity-80 transition-opacity"
              href="#"
              >Forgot?</a
            >
          </div>
          <div class="relative">
            <span
              class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant"
              >lock</span
            >
            <input
              class="input-field w-full h-touch-target-min rounded-lg pl-12 pr-4 font-body-base text-body-base placeholder-on-surface-variant/50"
              id="password"
              name="password"
              placeholder="••••••••"
              required=""
              type="password"
            />
            <button
              class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary transition-colors"
              type="button"
            >
              <span class="material-symbols-outlined">visibility_off</span>
            </button>
          </div>
        </div>
        <!-- Submit Button -->
        <button
          class="btn-primary w-full h-[56px] rounded-[16px] font-headline-md text-headline-md mt-stack-sm flex items-center justify-center gap-2"
          type="submit"
        >
          Sign In
          <span
            class="material-symbols-outlined"
            style="font-variation-settings: &quot;FILL&quot; 1"
            >arrow_forward</span
          >
        </button>
      </form>
      <!-- Secondary Action -->
      <div class="text-center mt-stack-sm">
        <p class="font-body-base text-body-base text-on-surface-variant">
          New to FitSync Pro?
          <a class="text-primary font-bold hover:underline" href="#"
            >Create Account</a
          >
        </p>
      </div>
    </main>
  </body>
</html>
