<!doctype html>

<html class="dark" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>FITSYNC PRO - Active Workout Logger</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-tertiary-fixed-variant": "#673d00",
              "on-secondary": "#30312e",
              "primary-fixed": "#e9ddff",
              "on-secondary-fixed": "#1b1c1a",
              "error-container": "#93000a",
              error: "#ffb4ab",
              tertiary: "#ffb869",
              "inverse-surface": "#d9e3f6",
              secondary: "#c8c6c3",
              "surface-tint": "#d0bcff",
              "on-error": "#690005",
              "on-tertiary-fixed": "#2c1700",
              "on-primary": "#3c0091",
              "surface-container-highest": "#2b3544",
              "primary-fixed-dim": "#d0bcff",
              "on-secondary-fixed-variant": "#474744",
              "on-surface": "#d9e3f6",
              "secondary-container": "#474744",
              "tertiary-fixed-dim": "#ffb869",
              background: "#091421",
              "surface-container-high": "#212b39",
              "on-primary-fixed-variant": "#5516be",
              outline: "#958ea0",
              "on-primary-container": "#340080",
              "on-primary-fixed": "#23005c",
              "tertiary-container": "#ca801e",
              "on-error-container": "#ffdad6",
              "on-background": "#d9e3f6",
              "surface-dim": "#091421",
              "inverse-primary": "#6d3bd7",
              "surface-container": "#16202e",
              "surface-variant": "#2b3544",
              "outline-variant": "#494454",
              surface: "#091421",
              "on-surface-variant": "#cbc3d7",
              "on-secondary-container": "#b6b5b1",
              "primary-container": "#a078ff",
              "inverse-on-surface": "#27313f",
              "on-tertiary": "#482900",
              "surface-bright": "#303a48",
              "secondary-fixed-dim": "#c8c6c3",
              primary: "#d0bcff",
              "on-tertiary-container": "#3f2300",
              "surface-container-low": "#121c2a",
              "surface-container-lowest": "#050f1c",
              "secondary-fixed": "#e4e2de",
              "tertiary-fixed": "#ffdcbb",
            },
            borderRadius: {
              DEFAULT: "0.25rem",
              lg: "0.5rem",
              xl: "0.75rem",
              full: "9999px",
            },
            spacing: {
              "touch-target-min": "48px",
              gutter: "16px",
              "stack-sm": "8px",
              "margin-mobile": "20px",
              "stack-lg": "24px",
              "stack-md": "16px",
            },
            fontFamily: {
              "label-caps": ["Plus Jakarta Sans"],
              "numeric-data": ["Plus Jakarta Sans"],
              "display-lg": ["Plus Jakarta Sans"],
              "body-lg": ["Plus Jakarta Sans"],
              "headline-md": ["Plus Jakarta Sans"],
              "body-base": ["Plus Jakarta Sans"],
              "display-xl": ["Plus Jakarta Sans"],
            },
            fontSize: {
              "label-caps": [
                "12px",
                {
                  lineHeight: "16px",
                  letterSpacing: "0.1em",
                  fontWeight: "700",
                },
              ],
              "numeric-data": [
                "20px",
                {
                  lineHeight: "24px",
                  letterSpacing: "-0.05em",
                  fontWeight: "600",
                },
              ],
              "display-lg": [
                "36px",
                {
                  lineHeight: "44px",
                  letterSpacing: "-0.03em",
                  fontWeight: "800",
                },
              ],
              "body-lg": [
                "18px",
                { lineHeight: "28px", letterSpacing: "0em", fontWeight: "400" },
              ],
              "headline-md": [
                "24px",
                {
                  lineHeight: "32px",
                  letterSpacing: "-0.02em",
                  fontWeight: "700",
                },
              ],
              "body-base": [
                "16px",
                { lineHeight: "24px", letterSpacing: "0em", fontWeight: "400" },
              ],
              "display-xl": [
                "48px",
                {
                  lineHeight: "56px",
                  letterSpacing: "-0.04em",
                  fontWeight: "800",
                },
              ],
            },
          },
        },
      };
    </script>
    <style>
      /* Glassmorphism utility classes based on Style Guidance */
      .glass-panel {
        background-color: rgba(255, 255, 255, 0.12);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.15);
      }

      /* Deep Charcoal background as requested (#1F2937) but mapped to closest theme token if applicable, though spec says Background #1F2937 explicitly, we use theme background which is surface container highest or similar, but let's stick to the prompt's explicit #1F2937 for the body if we must, or use theme background. The theme background is #091421. I'll use the theme background to be safe with tokens, but add a specific class if needed. */
      body {
        background-color: #1f2937; /* Direct request from prompt */
        color: #d9e3f6; /* on-surface */
      }

      .input-glow:focus {
        border-color: #d0bcff; /* primary */
        box-shadow: 0 0 10px rgba(208, 188, 255, 0.2);
        outline: none;
      }

      .btn-glow {
        box-shadow:
          inset 0 2px 0 rgba(255, 255, 255, 0.2),
          0 0 15px rgba(208, 188, 255, 0.2);
      }

      /* Hide number input spinners */
      input[type="number"]::-webkit-inner-spin-button,
      input[type="number"]::-webkit-outer-spin-button {
        -webkit-appearance: none;
        margin: 0;
      }
      input[type="number"] {
        -moz-appearance: textfield;
      }
    </style>
    <style>
      body {
        min-height: max(884px, 100dvh);
      }
    </style>
  </head>
  <body class="antialiased min-h-screen pb-32">
    <!-- Active Workout Header (Canvas Header, not TopAppBar since it's a specific transactional state) -->
    <header
      class="sticky top-0 z-40 bg-[#1F2937]/90 backdrop-blur-xl border-b border-white/10 px-margin-mobile py-4 flex justify-between items-center h-20"
    >
      <div class="flex items-center gap-4">
        <button
          class="h-touch-target-min w-touch-target-min flex items-center justify-center text-primary rounded-full hover:bg-white/5 transition-colors"
        >
          <span
            class="material-symbols-outlined"
            style="font-variation-settings: &quot;FILL&quot; 0"
            >close</span
          >
        </button>
        <div>
          <h1 class="text-headline-md font-headline-md text-on-surface">
            Pull Day
          </h1>
          <p
            class="text-label-caps font-label-caps text-on-surface-variant mt-1 tracking-widest uppercase"
          >
            Volume Focus
          </p>
        </div>
      </div>
      <!-- Running Clock -->
      <div
        class="glass-panel px-4 py-2 rounded-full flex items-center gap-2 text-primary border-primary/30"
      >
        <span class="material-symbols-outlined text-sm">timer</span>
        <span class="text-numeric-data font-numeric-data tracking-wider"
          >24:15</span
        >
      </div>
    </header>
    <!-- Main Content Canvas -->
    <main
      class="px-margin-mobile pt-stack-lg pb-stack-lg flex flex-col gap-stack-lg max-w-3xl mx-auto"
    >
      <!-- Floating Rest Timer Pill (Positioned absolute or sticky near top) -->
      <div class="fixed top-24 left-1/2 -translate-x-1/2 z-50">
        <div
          class="bg-gradient-to-r from-[#B06B00] to-[#D48806] text-white px-6 py-3 rounded-full shadow-[0_0_20px_rgba(212,136,6,0.3)] flex items-center gap-3 font-numeric-data text-numeric-data border border-white/20"
        >
          <span
            class="material-symbols-outlined animate-pulse"
            style="font-variation-settings: &quot;FILL&quot; 1"
            >hourglass_top</span
          >
          <span>01:45</span>
          <button
            class="ml-2 bg-white/20 hover:bg-white/30 rounded-full h-8 w-8 flex items-center justify-center transition-colors"
          >
            <span class="material-symbols-outlined text-sm">add</span>
          </button>
        </div>
      </div>
      <!-- Exercise Card 1: Barbell Rows -->
      <section class="glass-panel rounded-xl overflow-hidden shadow-lg mt-8">
        <!-- Card Header -->
        <div
          class="p-5 border-b border-white/10 flex justify-between items-start bg-surface-container-high/50"
        >
          <div class="flex gap-4">
            <img
              alt="Barbell Row Thumbnail"
              class="w-16 h-16 rounded-lg object-cover border border-white/10"
              data-alt="A close-up, high-contrast shot of a heavy barbell loaded with matte black bumper plates resting on a textured rubber gym floor. The lighting is dramatic and moody, casting deep shadows that highlight the knurling on the chrome bar. The overall aesthetic is gritty, industrial, and focused, fitting perfectly with a premium, intense fitness application's dark mode design."
              src="https://lh3.googleusercontent.com/aida-public/AB6AXuBdd2n2JG8Ym-PMMhn9cA4snBEeSkLKynt-jkDR0YLEZtwn-UvYA6NHJ8RAIktN2im_PxReMTRyniGsBO8dWzTy1IBbIkG0UcmrKbRYs00GaWbt-NuxxheR2QnY50-AXXQ8UMY1_0KAp-b__bT2SlggqIxCZ_80w7Cjpkv0Ro50nTbQfwKGkgb_OaNKSHCMhNvVSndseYpIXWN7lJo6PVZhR50tI5uH6u-KG2QRiTQjHeJmjO4WRkQrsCibKaePLy_KNXKUwdfi7AY"
            />
            <div>
              <h2 class="text-headline-md font-headline-md text-on-surface">
                Barbell Rows
              </h2>
              <p
                class="text-body-base font-body-base text-on-surface-variant mt-1"
              >
                Target: Mid Back, Lats
              </p>
            </div>
          </div>
          <button
            class="text-on-surface-variant hover:text-primary transition-colors h-touch-target-min w-12 flex items-center justify-center"
          >
            <span class="material-symbols-outlined">more_vert</span>
          </button>
        </div>
        <!-- Sets Matrix -->
        <div class="p-5 flex flex-col gap-4">
          <!-- Column Headers -->
          <div
            class="grid grid-cols-12 gap-2 px-2 text-label-caps font-label-caps text-on-surface-variant uppercase tracking-wider text-center"
          >
            <div class="col-span-1 text-left">Set</div>
            <div class="col-span-4">Previous</div>
            <div class="col-span-3">kg</div>
            <div class="col-span-2">Reps</div>
            <div class="col-span-2"></div>
          </div>
          <!-- Set 1 (Completed) -->
          <div
            class="grid grid-cols-12 gap-2 items-center bg-primary/10 rounded-lg p-2 border border-primary/20 transition-all"
          >
            <div
              class="col-span-1 text-numeric-data font-numeric-data text-primary text-center"
            >
              1
            </div>
            <div
              class="col-span-4 text-body-base font-body-base text-on-surface-variant/70 text-center flex flex-col justify-center"
            >
              <span class="text-sm">100kg × 12</span>
            </div>
            <div class="col-span-3">
              <input
                class="w-full h-touch-target-min bg-surface/50 border border-white/20 rounded-lg text-center text-numeric-data font-numeric-data text-on-surface input-glow focus:bg-surface/80"
                disabled=""
                type="number"
                value="100"
              />
            </div>
            <div class="col-span-2">
              <input
                class="w-full h-touch-target-min bg-surface/50 border border-white/20 rounded-lg text-center text-numeric-data font-numeric-data text-on-surface input-glow focus:bg-surface/80"
                disabled=""
                type="number"
                value="12"
              />
            </div>
            <div class="col-span-2 flex justify-center">
              <button
                class="h-10 w-10 rounded-lg bg-primary text-on-primary flex items-center justify-center btn-glow shadow-[0_0_15px_rgba(208,188,255,0.4)]"
              >
                <span
                  class="material-symbols-outlined"
                  style="font-variation-settings: &quot;FILL&quot; 1"
                  >check</span
                >
              </button>
            </div>
          </div>
          <!-- Set 2 (Active) -->
          <div
            class="grid grid-cols-12 gap-2 items-center bg-surface-container-highest/30 rounded-lg p-2 border border-white/10 transition-all relative overflow-hidden"
          >
            <!-- Active Indicator Line -->
            <div class="absolute left-0 top-0 bottom-0 w-1 bg-primary"></div>
            <div
              class="col-span-1 text-numeric-data font-numeric-data text-on-surface text-center"
            >
              2
            </div>
            <div
              class="col-span-4 text-body-base font-body-base text-on-surface-variant/70 text-center flex flex-col justify-center"
            >
              <span class="text-sm">100kg × 10</span>
            </div>
            <div class="col-span-3">
              <input
                class="w-full h-touch-target-min bg-background/50 border border-white/20 rounded-lg text-center text-numeric-data font-numeric-data text-on-surface input-glow focus:bg-surface/80"
                placeholder="100"
                type="number"
              />
            </div>
            <div class="col-span-2">
              <input
                class="w-full h-touch-target-min bg-background/50 border border-white/20 rounded-lg text-center text-numeric-data font-numeric-data text-on-surface input-glow focus:bg-surface/80"
                placeholder="10"
                type="number"
              />
            </div>
            <div class="col-span-2 flex justify-center">
              <button
                class="h-10 w-10 rounded-lg bg-surface-bright border border-white/20 text-on-surface-variant hover:border-primary hover:text-primary transition-all flex items-center justify-center"
              >
                <span class="material-symbols-outlined">check</span>
              </button>
            </div>
          </div>
          <!-- Set 3 (Upcoming) -->
          <div
            class="grid grid-cols-12 gap-2 items-center bg-surface-container-highest/10 rounded-lg p-2 border border-transparent opacity-60"
          >
            <div
              class="col-span-1 text-numeric-data font-numeric-data text-on-surface-variant text-center"
            >
              3
            </div>
            <div
              class="col-span-4 text-body-base font-body-base text-on-surface-variant/50 text-center flex flex-col justify-center"
            >
              <span class="text-sm">100kg × 10</span>
            </div>
            <div class="col-span-3">
              <input
                class="w-full h-touch-target-min bg-transparent border border-white/10 rounded-lg text-center text-numeric-data font-numeric-data text-on-surface-variant"
                placeholder="100"
                type="number"
              />
            </div>
            <div class="col-span-2">
              <input
                class="w-full h-touch-target-min bg-transparent border border-white/10 rounded-lg text-center text-numeric-data font-numeric-data text-on-surface-variant"
                placeholder="10"
                type="number"
              />
            </div>
            <div class="col-span-2 flex justify-center">
              <button
                class="h-10 w-10 rounded-lg bg-transparent border border-white/10 text-on-surface-variant/50 flex items-center justify-center"
              >
                <span class="material-symbols-outlined">check</span>
              </button>
            </div>
          </div>
          <!-- Add Set Button -->
          <button
            class="mt-2 w-full h-touch-target-min border border-dashed border-white/20 rounded-lg text-primary flex items-center justify-center gap-2 hover:bg-white/5 transition-colors text-label-caps font-label-caps uppercase tracking-wider"
          >
            <span class="material-symbols-outlined text-sm">add</span> Add Set
          </button>
        </div>
      </section>
      <!-- Global Action: Finish Workout -->
      <button
        class="w-full h-[56px] bg-primary text-on-primary rounded-xl text-headline-md font-headline-md mt-4 btn-glow flex items-center justify-center gap-2"
      >
        Finish Workout
        <span
          class="material-symbols-outlined"
          style="font-variation-settings: &quot;FILL&quot; 1"
          >flag</span
        >
      </button>
    </main>
    <!-- Suppressed TopAppBar and BottomNavBar as this is a linear/transactional task (Active Workout) with a close action -->
  </body>
</html>
