<!doctype html>

<html class="dark" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Workout Builder - FitSync Pro</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-tertiary": "#482900",
              "primary-container": "#a078ff",
              "inverse-on-surface": "#27313f",
              "secondary-fixed-dim": "#c8c6c3",
              "surface-bright": "#303a48",
              primary: "#d0bcff",
              "tertiary-fixed": "#ffdcbb",
              "surface-container-lowest": "#050f1c",
              "surface-container-low": "#121c2a",
              "secondary-fixed": "#e4e2de",
              "on-tertiary-container": "#3f2300",
              "on-primary-fixed": "#23005c",
              "tertiary-container": "#ca801e",
              "on-error-container": "#ffdad6",
              "on-background": "#d9e3f6",
              "surface-container": "#16202e",
              "inverse-primary": "#6d3bd7",
              "surface-dim": "#091421",
              "surface-variant": "#2b3544",
              "outline-variant": "#494454",
              surface: "#091421",
              "on-surface-variant": "#cbc3d7",
              "on-secondary-container": "#b6b5b1",
              "on-surface": "#d9e3f6",
              "on-secondary-fixed-variant": "#474744",
              "tertiary-fixed-dim": "#ffb869",
              "secondary-container": "#474744",
              background: "#091421",
              outline: "#958ea0",
              "on-primary-fixed-variant": "#5516be",
              "surface-container-high": "#212b39",
              "on-primary-container": "#340080",
              "primary-fixed": "#e9ddff",
              "on-secondary-fixed": "#1b1c1a",
              "on-tertiary-fixed-variant": "#673d00",
              "on-secondary": "#30312e",
              "error-container": "#93000a",
              tertiary: "#ffb869",
              "inverse-surface": "#d9e3f6",
              error: "#ffb4ab",
              "surface-tint": "#d0bcff",
              secondary: "#c8c6c3",
              "on-tertiary-fixed": "#2c1700",
              "on-primary": "#3c0091",
              "on-error": "#690005",
              "surface-container-highest": "#2b3544",
              "primary-fixed-dim": "#d0bcff",
            },
            borderRadius: {
              DEFAULT: "0.25rem",
              lg: "0.5rem",
              xl: "0.75rem",
              full: "9999px",
            },
            spacing: {
              "touch-target-min": "48px",
              "stack-sm": "8px",
              gutter: "16px",
              "stack-lg": "24px",
              "margin-mobile": "20px",
              "stack-md": "16px",
            },
            fontFamily: {
              "body-lg": ["Plus Jakarta Sans"],
              "headline-md": ["Plus Jakarta Sans"],
              "body-base": ["Plus Jakarta Sans"],
              "display-xl": ["Plus Jakarta Sans"],
              "numeric-data": ["Plus Jakarta Sans"],
              "label-caps": ["Plus Jakarta Sans"],
              "display-lg": ["Plus Jakarta Sans"],
            },
            fontSize: {
              "body-lg": [
                "18px",
                { lineHeight: "28px", letterSpacing: "0em", fontWeight: "400" },
              ],
              "headline-md": [
                "24px",
                {
                  lineHeight: "32px",
                  letterSpacing: "-0.02em",
                  fontWeight: "700",
                },
              ],
              "body-base": [
                "16px",
                { lineHeight: "24px", letterSpacing: "0em", fontWeight: "400" },
              ],
              "display-xl": [
                "48px",
                {
                  lineHeight: "56px",
                  letterSpacing: "-0.04em",
                  fontWeight: "800",
                },
              ],
              "numeric-data": [
                "20px",
                {
                  lineHeight: "24px",
                  letterSpacing: "-0.05em",
                  fontWeight: "600",
                },
              ],
              "label-caps": [
                "12px",
                {
                  lineHeight: "16px",
                  letterSpacing: "0.1em",
                  fontWeight: "700",
                },
              ],
              "display-lg": [
                "36px",
                {
                  lineHeight: "44px",
                  letterSpacing: "-0.03em",
                  fontWeight: "800",
                },
              ],
            },
          },
        },
      };
    </script>
    <style>
      .material-symbols-outlined {
        font-variation-settings:
          "FILL" 0,
          "wght" 400,
          "GRAD" 0,
          "opsz" 24;
      }
      /* Custom scrollbar for web if needed, though mostly mobile focus */
      ::-webkit-scrollbar {
        width: 0px;
        background: transparent;
      }
    </style>
    <style>
      body {
        min-height: max(884px, 100dvh);
      }
    </style>
  </head>
  <body
    class="bg-background text-on-background font-body-base min-h-screen relative antialiased selection:bg-primary/30 selection:text-primary-fixed"
  >
    <!-- Task-Focused Header (Suppresses Global Nav Shell) -->
    <header
      class="px-margin-mobile pt-8 pb-6 sticky top-0 z-40 bg-background/85 backdrop-blur-xl border-b border-transparent"
    >
      <div class="flex items-center justify-between mb-8">
        <button
          class="w-10 h-10 flex items-center justify-center text-on-surface-variant hover:text-on-background transition-colors active:scale-95 rounded-full"
        >
          <span class="material-symbols-outlined text-[28px]">close</span>
        </button>
        <button
          class="w-12 h-12 flex items-center justify-center bg-primary text-on-primary rounded-full shadow-[0_0_20px_rgba(208,188,255,0.3)] hover:opacity-90 active:scale-90 transition-all duration-200 relative overflow-hidden"
        >
          <div class="absolute inset-x-0 top-0 h-[1px] bg-white/40"></div>
          <span
            class="material-symbols-outlined"
            style="font-variation-settings: &quot;FILL&quot; 1"
            >check</span
          >
        </button>
      </div>
      <div class="flex flex-col gap-3">
        <input
          class="w-full bg-transparent border-none outline-none font-display-lg text-display-lg text-on-background p-0 focus:ring-0 placeholder:text-surface-variant tracking-tighter"
          placeholder="Name your workout"
          type="text"
          value="My Custom Leg Day"
        />
        <div
          class="flex items-center gap-2 text-primary font-body-base cursor-pointer hover:opacity-80 transition-opacity w-fit px-3 py-1.5 rounded-lg bg-surface-container-high/50 border border-white/5"
        >
          <span class="material-symbols-outlined text-[18px]"
            >calendar_today</span
          >
          <span>Monday, Oct 12 | 6:00 PM</span>
        </div>
      </div>
    </header>
    <!-- Main Content: Exercise Configuration Cards -->
    <main class="px-margin-mobile pb-[140px] pt-4 flex flex-col gap-stack-lg">
      <!-- Exercise Card 1 (Expanded) -->
      <article
        class="bg-surface-container/60 backdrop-blur-[20px] border border-white/15 rounded-[24px] p-6 shadow-lg shadow-black/20"
      >
        <!-- Card Header -->
        <div class="flex items-center justify-between mb-8">
          <div class="flex items-center gap-3">
            <button
              class="text-surface-variant hover:text-on-surface-variant cursor-grab active:cursor-grabbing transition-colors touch-none"
            >
              <span class="material-symbols-outlined">drag_indicator</span>
            </button>
            <h2 class="font-headline-md text-headline-md text-on-background">
              Barbell Squat
            </h2>
          </div>
          <button
            class="text-on-surface-variant w-10 h-10 flex items-center justify-center rounded-full hover:bg-white/5 transition-colors"
          >
            <span class="material-symbols-outlined">more_vert</span>
          </button>
        </div>
        <!-- Set Column Headers -->
        <div class="grid grid-cols-[32px_1fr_1fr_1fr] gap-4 mb-4 px-2">
          <div></div>
          <!-- Spacer -->
          <div
            class="font-label-caps text-label-caps text-on-surface-variant text-center"
          >
            Reps
          </div>
          <div
            class="font-label-caps text-label-caps text-on-surface-variant text-center"
          >
            Lbs
          </div>
          <div
            class="font-label-caps text-label-caps text-on-surface-variant text-center"
          >
            Rest
          </div>
        </div>
        <!-- Set Row 1 -->
        <div
          class="grid grid-cols-[32px_1fr_1fr_1fr] gap-4 items-center mb-4 group"
        >
          <div
            class="w-8 h-8 rounded-full bg-surface-variant flex items-center justify-center font-numeric-data text-[14px] text-on-surface-variant group-focus-within:bg-primary/20 group-focus-within:text-primary transition-colors"
          >
            1
          </div>
          <input
            class="h-touch-target-min bg-surface-container-lowest border border-white/10 rounded-xl text-center font-numeric-data text-numeric-data text-on-background focus:border-primary focus:ring-1 focus:ring-primary/30 outline-none transition-all shadow-inner"
            inputmode="numeric"
            type="text"
            value="10"
          />
          <input
            class="h-touch-target-min bg-surface-container-lowest border border-white/10 rounded-xl text-center font-numeric-data text-numeric-data text-on-background focus:border-primary focus:ring-1 focus:ring-primary/30 outline-none transition-all shadow-inner"
            inputmode="numeric"
            type="text"
            value="225"
          />
          <input
            class="h-touch-target-min bg-surface-container-lowest border border-white/10 rounded-xl text-center font-numeric-data text-numeric-data text-on-background focus:border-primary focus:ring-1 focus:ring-primary/30 outline-none transition-all shadow-inner"
            inputmode="text"
            type="text"
            value="2:00"
          />
        </div>
        <!-- Set Row 2 -->
        <div
          class="grid grid-cols-[32px_1fr_1fr_1fr] gap-4 items-center mb-8 group"
        >
          <div
            class="w-8 h-8 rounded-full bg-surface-variant flex items-center justify-center font-numeric-data text-[14px] text-on-surface-variant group-focus-within:bg-primary/20 group-focus-within:text-primary transition-colors"
          >
            2
          </div>
          <input
            class="h-touch-target-min bg-surface-container-lowest border border-white/10 rounded-xl text-center font-numeric-data text-numeric-data text-on-background focus:border-primary focus:ring-1 focus:ring-primary/30 outline-none transition-all shadow-inner"
            inputmode="numeric"
            type="text"
            value="8"
          />
          <input
            class="h-touch-target-min bg-surface-container-lowest border border-white/10 rounded-xl text-center font-numeric-data text-numeric-data text-on-background focus:border-primary focus:ring-1 focus:ring-primary/30 outline-none transition-all shadow-inner"
            inputmode="numeric"
            type="text"
            value="245"
          />
          <input
            class="h-touch-target-min bg-surface-container-lowest border border-white/10 rounded-xl text-center font-numeric-data text-numeric-data text-on-background focus:border-primary focus:ring-1 focus:ring-primary/30 outline-none transition-all shadow-inner"
            inputmode="text"
            type="text"
            value="2:30"
          />
        </div>
        <!-- Add Set Action -->
        <button
          class="w-full h-touch-target-min flex items-center justify-center gap-2 font-body-lg text-body-lg text-primary hover:bg-primary/10 rounded-[16px] transition-colors border border-dashed border-primary/30"
        >
          <span class="material-symbols-outlined">add</span>
          Add Set
        </button>
      </article>
      <!-- Exercise Card 2 (Collapsed) -->
      <article
        class="bg-surface-container/40 backdrop-blur-[20px] border border-white/10 rounded-[24px] p-6 shadow-lg shadow-black/20 flex items-center justify-between opacity-80 hover:opacity-100 transition-opacity"
      >
        <div class="flex items-center gap-4">
          <button
            class="text-surface-variant hover:text-on-surface-variant cursor-grab active:cursor-grabbing transition-colors touch-none"
          >
            <span class="material-symbols-outlined">drag_indicator</span>
          </button>
          <div>
            <h2
              class="font-headline-md text-[20px] leading-tight text-on-background mb-1"
            >
              Leg Press
            </h2>
            <p class="font-body-base text-[14px] text-on-surface-variant">
              3 Sets • Targeting 10-12 Reps
            </p>
          </div>
        </div>
        <button
          class="text-on-surface-variant w-10 h-10 flex items-center justify-center rounded-full hover:bg-white/5 transition-colors"
        >
          <span class="material-symbols-outlined">expand_more</span>
        </button>
      </article>
    </main>
    <!-- Contextual Sticky Bottom Action Bar -->
    <div
      class="fixed bottom-0 left-0 w-full px-margin-mobile pb-8 pt-4 bg-background/80 backdrop-blur-[24px] border-t border-white/5 z-50"
    >
      <button
        class="w-full h-[56px] bg-primary text-on-primary rounded-[16px] font-headline-md flex items-center justify-center gap-3 shadow-[0_-4px_24px_rgba(208,188,255,0.15)] hover:bg-primary-fixed transition-colors active:scale-[0.98] relative overflow-hidden"
      >
        <div class="absolute inset-x-0 top-0 h-[1px] bg-white/40"></div>
        <span class="material-symbols-outlined text-[24px]">add</span>
        Add Exercise
      </button>
    </div>
  </body>
</html>
